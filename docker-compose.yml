version: "3.9"

services:

  db:
    image: postgres:15
    container_name: orders_db
    restart: always
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: orders_rabbitmq
    restart: always
    ports:
      - "5672:5672"     # conexão da aplicação
      - "15672:15672"   # painel web
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  app:
    build: .
    container_name: orders_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      RABBITMQ_HOST: rabbitmq  # 🔥 importante
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    volumes:
      - .:/app
    command: uvicorn app.interfaces.api:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    container_name: orders_worker
    environment:
      PYTHONPATH: /app
      RABBITMQ_HOST: rabbitmq
    depends_on:
      rabbitmq:
        condition: service_started
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: python -m app.infrastructure.queue.consumer

  tests:
    build: .
    container_name: orders_tests
    environment:
      PYTHONPATH: /app
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: pytest -v

volumes:
  postgres_data: